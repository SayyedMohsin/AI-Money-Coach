<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Wallet - AI Money Coach</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --primary-green: #67a38a;
            --soft-white: #f7f9f8;
            --text-dark: #3a4742;
        }
        body { background-color: #f0f4f2; font-family: 'Quicksand', sans-serif; display: flex; justify-content: center; margin: 0; color: var(--text-dark); }
        .app-container { width: 100%; max-width: 414px; height: 100vh; background-color: white; position: relative; box-shadow: 0 20px 50px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        .header-bg { background-color: var(--primary-green); color: white; padding: 20px; text-align: center; position: relative; }
        .content-area { flex: 1; overflow-y: auto; padding-bottom: 90px; }
        
        /* Tab Design like the image */
        .tab-container { display: flex; background: var(--primary-green); padding: 5px 20px 15px 20px; justify-content: space-around; font-size: 0.85rem; color: rgba(255,255,255,0.7); }
        .tab-item.active { color: white; border-bottom: 2px solid white; padding-bottom: 4px; font-weight: bold; }

        /* Navigation Bar */
        .nav-bar { position: absolute; bottom: 0; width: 100%; height: 70px; background: white; border-top: 1px solid #eee; display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #9bb0a5; cursor: pointer; font-size: 0.7rem; width: 25%; font-weight: 600; }
        .nav-item.active { color: var(--primary-green); }
        .nav-item i { font-size: 1.4rem; margin-bottom: 3px; }

        .view { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .balance-circle { width: 180px; height: 180px; margin: 20px auto; position: relative; }
        .balance-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }

        /* Premium Input */
        .premium-input { background: #f4f7f6; border: 1px solid #e0e6e3; border-radius: 12px; padding: 15px; width: 100%; outline: none; margin-bottom: 15px; }
        .premium-input:focus { border-color: var(--primary-green); background: white; }

        .add-btn-float { position: absolute; right: 25px; bottom: 100px; width: 55px; height: 55px; background: #febd41; border-radius: 50%; display: flex; items-center; justify-center; color: white; font-size: 1.5rem; box-shadow: 0 8px 20px rgba(254, 189, 65, 0.4); z-index: 90; cursor: pointer; border: none; outline: none; }
        
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid var(--primary-green); border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header-bg">
        <div class="flex justify-between items-center mb-4">
            <i class="fa-solid fa-bars text-lg"></i>
            <span class="text-sm font-bold uppercase tracking-widest">Balance</span>
            <i class="fa-solid fa-file-lines text-lg"></i>
        </div>
        <div id="top-balance" class="text-2xl font-bold">₹0</div>
    </div>

    <div class="tab-container">
        <span class="tab-item active">Day</span>
        <span class="tab-item">Week</span>
        <span class="tab-item">Month</span>
        <span class="tab-item">Year</span>
    </div>

    <div class="content-area" id="content-area">
        
        <div id="home-view" class="view active">
            <div class="balance-circle">
                <canvas id="expenseChart"></canvas>
                <div class="balance-text">
                    <p class="text-[10px] uppercase text-slate-400 font-bold">Spent</p>
                    <p class="text-xl font-bold" id="ui-expense">₹0</p>
                </div>
            </div>

            <div class="flex justify-between items-center px-4 mb-6">
                <div class="text-center">
                    <p class="text-[10px] uppercase text-slate-400 font-bold">Runway</p>
                    <p class="font-bold text-sm" id="ui-days">--</p>
                </div>
                <div class="text-center">
                    <p class="text-[10px] uppercase text-slate-400 font-bold">Income</p>
                    <p class="font-bold text-sm text-emerald-500" id="ui-income-total">₹0</p>
                </div>
            </div>

            <div id="recent-transactions" class="space-y-4 px-2"></div>
        </div>

        <div id="add-view" class="view">
            <h2 class="text-xl font-bold mb-6 text-center">New Operation</h2>
            <div class="flex gap-2 mb-6">
                <button onclick="setEntryType('Expense')" id="btn-expense" class="flex-1 py-3 rounded-xl bg-[#67a38a] text-white font-bold">Expense</button>
                <button onclick="setEntryType('Income')" id="btn-income" class="flex-1 py-3 rounded-xl bg-slate-100 text-slate-400 font-bold">Income</button>
            </div>
            <input type="date" id="input-date" class="premium-input">
            <select id="input-category" class="premium-input"></select>
            <input type="number" id="input-amount" placeholder="0.00 $" class="premium-input text-lg font-bold">
            <input type="text" id="input-note" placeholder="Description..." class="premium-input">
            <button onclick="addTransaction()" id="save-btn" class="w-full py-4 bg-[#67a38a] text-white rounded-xl font-bold shadow-lg">Add Transaction</button>
        </div>

        <div id="chat-view" class="view flex flex-col h-full" style="height: 75vh;">
            <div class="bg-emerald-50 p-4 rounded-2xl mb-4 border border-emerald-100">
                <p class="text-xs font-bold text-emerald-700 uppercase mb-1">AI Financial Coach</p>
                <p class="text-[10px] text-emerald-600">English & Hindi support available</p>
            </div>
            <div id="chat-box" class="flex-1 overflow-y-auto mb-4 space-y-3 pr-2"></div>
            <div class="flex gap-2 bg-slate-100 p-2 rounded-full">
                <input type="text" id="chat-input" placeholder="Mera kharcha kitna hai?" class="flex-1 bg-transparent px-4 py-2 text-sm outline-none">
                <button onclick="sendChat()" class="w-10 h-10 bg-[#67a38a] text-white rounded-full flex items-center justify-center"><i class="fa-solid fa-paper-plane text-xs"></i></button>
            </div>
        </div>

        <div id="history-view" class="view">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold">History</h2>
                <div class="flex gap-2">
                    <button onclick="viewInvoice()" class="p-2 text-[#67a38a]"><i class="fa-solid fa-file-invoice-dollar text-xl"></i></button>
                    <button onclick="clearDatabase()" class="p-2 text-red-400"><i class="fa-solid fa-trash-can text-lg"></i></button>
                </div>
            </div>
            <div id="all-transactions" class="space-y-4"></div>
        </div>
    </div>

    <button class="add-btn-float" onclick="switchTab('add')"><i class="fa-solid fa-plus"></i></button>

    <div class="nav-bar">
        <div class="nav-item active" onclick="switchTab('home')"><i class="fa-solid fa-house-chimney"></i><span>Home</span></div>
        <div class="nav-item" onclick="switchTab('chat')"><i class="fa-solid fa-robot"></i><span>Coach</span></div>
        <div class="nav-item" onclick="switchTab('history')"><i class="fa-solid fa-clock-rotate-left"></i><span>History</span></div>
        <div class="nav-item" onclick="viewInvoice()"><i class="fa-solid fa-chart-line"></i><span>Report</span></div>
    </div>

    <div id="invoice-modal" class="modal fixed inset-0 bg-black/50 hidden z-[200] items-center justify-center p-4">
        <div class="bg-white w-full rounded-3xl overflow-hidden flex flex-col max-h-[85vh]">
            <div class="bg-[#67a38a] p-4 text-white flex justify-between items-center">
                <span class="font-bold">Monthly Invoice</span>
                <button onclick="closeInvoice()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="p-4 overflow-y-auto bg-white" id="invoice-content-print">
                <div id="invoice-content"></div>
            </div>
            <div class="p-4 bg-slate-50 flex gap-2">
                <button onclick="downloadCSV()" class="flex-1 py-2 bg-emerald-600 text-white rounded-lg text-xs font-bold">CSV</button>
                <button onclick="downloadPDF()" class="flex-1 py-2 bg-red-600 text-white rounded-lg text-xs font-bold">PDF</button>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://ai-money-coach.onrender.com"; 
    let sessionId = localStorage.getItem('moneycoach_session_id');
    if (!sessionId) {
        sessionId = 'user_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('moneycoach_session_id', sessionId);
    }

    function getHeaders() { return { "Content-Type": "application/json", "X-Session-ID": sessionId }; }

    let currentEntryType = "Expense";
    let expenseChartInstance = null;
    document.getElementById('input-date').valueAsDate = new Date();

    function switchTab(tabName) {
        document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
        document.getElementById(tabName + '-view').classList.add('active');
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        const navItems = document.querySelectorAll('.nav-item');
        if(tabName === 'home') navItems[0].classList.add('active');
        if(tabName === 'chat') navItems[1].classList.add('active');
        if(tabName === 'history') navItems[2].classList.add('active');
        
        if(tabName === 'home') fetchData();
        if(tabName === 'history') fetchHistory();
    }

    function setEntryType(type) {
        currentEntryType = type;
        const btnExp = document.getElementById('btn-expense');
        const btnInc = document.getElementById('btn-income');
        const catSelect = document.getElementById('input-category');
        btnExp.className = btnInc.className = "flex-1 py-3 rounded-xl font-bold";
        if(type === 'Expense') {
            btnExp.classList.add('bg-[#67a38a]', 'text-white');
            btnInc.classList.add('bg-slate-100', 'text-slate-400');
            catSelect.innerHTML = `<option>Food & Dining</option><option>Groceries</option><option>Transport</option><option>Shopping</option><option>Rent</option><option>Bills</option><option>Health</option><option>SIP/Investments</option><option>Others</option>`;
        } else {
            btnInc.classList.add('bg-[#67a38a]', 'text-white');
            btnExp.classList.add('bg-slate-100', 'text-slate-400');
            catSelect.innerHTML = `<option>Salary</option><option>Freelance</option><option>Pocket Money</option><option>Investments</option><option>Others</option>`;
        }
    }

    async function fetchData() {
        try {
            const res = await fetch(`${API_URL}/summary`, { headers: getHeaders() });
            const data = await res.json();
            document.getElementById('top-balance').innerText = `₹${data.current_balance.toLocaleString('en-IN')}`;
            document.getElementById('ui-expense').innerText = `₹${data.total_expense.toLocaleString('en-IN')}`;
            document.getElementById('ui-income-total').innerText = `₹${data.monthly_income.toLocaleString('en-IN')}`;
            
            let runway = "--";
            if(data.avg_daily_expense > 0 && data.current_balance > 0) {
                runway = `${Math.floor(data.current_balance / data.avg_daily_expense)} Days`;
            }
            document.getElementById('ui-days').innerText = runway;
            
            fetchHistory(true);
            renderChart();
        } catch (e) { console.error("Summary error", e); }
    }

    async function fetchHistory(onlyRecent = false) {
        try {
            const res = await fetch(`${API_URL}/transactions`, { headers: getHeaders() });
            const data = await res.json();
            const container = document.getElementById(onlyRecent ? 'recent-transactions' : 'all-transactions');
            container.innerHTML = '';
            const items = onlyRecent ? data.slice(0, 5) : data;
            
            items.forEach(t => {
                const isExp = t.type === 'Expense';
                container.innerHTML += `
                    <div class="flex items-center justify-between p-3 bg-white rounded-2xl border border-slate-50 shadow-sm">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full flex items-center justify-center ${isExp?'bg-red-50 text-red-400':'bg-emerald-50 text-emerald-400'}">
                                <i class="fa-solid ${isExp?'fa-minus':'fa-plus'} text-xs"></i>
                            </div>
                            <div>
                                <p class="text-xs font-bold">${t.category}</p>
                                <p class="text-[10px] text-slate-400">${t.date}</p>
                            </div>
                        </div>
                        <p class="text-sm font-bold ${isExp?'text-slate-700':'text-emerald-500'}">₹${t.amount}</p>
                    </div>`;
            });
        } catch (e) {}
    }

    async function addTransaction() {
        const payload = { 
            type: currentEntryType, 
            category: document.getElementById('input-category').value, 
            amount: parseFloat(document.getElementById('input-amount').value), 
            note: document.getElementById('input-note').value, 
            date: document.getElementById('input-date').value 
        };
        if(!payload.amount) return;
        const btn = document.getElementById('save-btn');
        btn.innerHTML = '<div class="loader mx-auto"></div>';
        try {
            await fetch(`${API_URL}/transactions`, { method: "POST", headers: getHeaders(), body: JSON.stringify(payload) });
            await fetchData();
            switchTab('home');
        } catch (e) {}
        btn.innerHTML = 'Add Transaction';
    }

    async function renderChart() {
        const month = new Date().toISOString().slice(0, 7);
        try {
            const res = await fetch(`${API_URL}/monthly-report/${month}`, { headers: getHeaders() });
            const data = await res.json();
            const ctx = document.getElementById('expenseChart').getContext('2d');
            if (expenseChartInstance) expenseChartInstance.destroy();
            
            expenseChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    datasets: [{ 
                        data: data.category_breakdown.length ? data.category_breakdown.map(i => i.total) : [1], 
                        backgroundColor: ['#fd5c63', '#febd41', '#3498db', '#2ecc71', '#9b59b6'],
                        borderWidth: 0
                    }]
                },
                options: { cutout: '85%', plugins: { legend: { display: false } } }
            });
        } catch (e) {}
    }

    async function sendChat() {
        const input = document.getElementById('chat-input');
        const question = input.value.trim();
        if(!question) return;
        const chatBox = document.getElementById('chat-box');
        chatBox.innerHTML += `<div class="flex justify-end"><div class="bg-slate-700 text-white p-3 rounded-2xl rounded-tr-none text-xs">${question}</div></div>`;
        input.value = '';
        try {
            const res = await fetch(`${API_URL}/chat`, { method: "POST", headers: getHeaders(), body: JSON.stringify({ question }) });
            const data = await res.json();
            chatBox.innerHTML += `<div class="flex justify-start"><div class="bg-slate-100 text-slate-600 p-3 rounded-2xl rounded-tl-none text-xs border">${data.reply}</div></div>`;
        } catch (e) {}
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function viewInvoice() {
        const modal = document.getElementById('invoice-modal');
        modal.classList.remove('hidden');
        modal.classList.add('flex');
        const month = new Date().toISOString().slice(0, 7);
        const res = await fetch(`${API_URL}/monthly-report/${month}`, { headers: getHeaders() });
        const data = await res.json();
        let html = `<div class="text-center mb-4"><p class="text-xl font-bold">Report</p><p class="text-[10px] uppercase">${month}</p></div>`;
        html += `<div class="bg-slate-50 p-4 rounded-xl flex justify-between mb-4"><div><p class="text-[10px] font-bold">Income</p><p class="text-emerald-500 font-bold">₹${data.total_income}</p></div><div><p class="text-[10px] font-bold">Spent</p><p class="text-red-400 font-bold">₹${data.total_expense}</p></div></div>`;
        html += `<table class="w-full text-[10px]"><tbody>`;
        data.transactions.forEach(t => {
            html += `<tr class="border-b"><td class="py-2">${t.date}</td><td class="py-2 font-bold">${t.category}</td><td class="py-2 text-right">₹${t.amount}</td></tr>`;
        });
        html += `</tbody></table>`;
        document.getElementById('invoice-content').innerHTML = html;
    }

    function closeInvoice() { document.getElementById('invoice-modal').classList.add('hidden'); }
    function downloadCSV() { /* CSV Logic */ }
    function downloadPDF() { html2pdf().from(document.getElementById('invoice-content')).save(); }

    window.onload = () => { setEntryType('Expense'); fetchData(); };
</script>
</body>
</html>

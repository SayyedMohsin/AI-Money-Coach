<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Wallet - Professional Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --primary: #67a38a;
            --secondary: #febd41;
            --bg-light: #f8faf9;
            --text-main: #2d3748;
        }
        body { background-color: #f0f2f1; font-family: 'Quicksand', sans-serif; display: flex; justify-content: center; margin: 0; color: var(--text-main); }
        .app-container { width: 100%; max-width: 414px; height: 100vh; background-color: var(--bg-light); position: relative; box-shadow: 0 40px 100px rgba(0,0,0,0.15); display: flex; flex-direction: column; overflow: hidden; }
        
        /* Professional Header */
        .app-header { background: var(--primary); padding: 30px 24px 45px 24px; color: white; border-radius: 0 0 40px 40px; }
        
        .content-area { flex: 1; overflow-y: auto; padding-bottom: 100px; margin-top: -30px; }
        
        /* Navbar */
        .nav-bar { position: absolute; bottom: 0; width: 100%; height: 80px; background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border-top: 1px solid #edf2f0; display: flex; justify-content: space-around; align-items: center; z-index: 100; padding-bottom: 15px; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #9bb0a5; cursor: pointer; font-size: 0.75rem; font-weight: 700; transition: 0.3s; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 1.5rem; margin-bottom: 4px; }

        /* Floating Add Button - Perfected */
        .fab-button { position: absolute; left: 50%; bottom: 40px; transform: translateX(-50%); width: 65px; height: 65px; background: var(--secondary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 1.8rem; box-shadow: 0 10px 25px rgba(254, 189, 65, 0.4); z-index: 110; border: 5px solid white; cursor: pointer; }

        /* Views */
        .view { display: none; padding: 0 20px; animation: fadeInUp 0.4s ease; }
        .view.active { display: block; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Elements */
        .card { background: white; border-radius: 28px; padding: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.03); border: 1px solid #f0f4f2; margin-bottom: 20px; }
        .premium-input { background: #f1f5f3; border: 2px solid transparent; border-radius: 18px; padding: 18px; width: 100%; outline: none; transition: 0.3s; font-weight: 600; }
        .premium-input:focus { border-color: var(--primary); background: white; }
        
        /* Modal Fix */
        .modal-box { background: white; width: 90%; max-width: 360px; border-radius: 35px; overflow: hidden; max-height: 80vh; display: flex; flex-direction: column; }
        .modal-body { overflow-y: auto; padding: 25px; flex: 1; }

        .loader { border: 3px solid #f3f3f3; border-top: 3px solid var(--primary); border-radius: 50%; width: 22px; height: 22px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="app-container">
    <div class="app-header">
        <div class="flex justify-between items-center mb-6">
            <i class="fa-solid fa-grid-2 text-xl opacity-80"></i>
            <span class="font-bold text-sm tracking-widest uppercase">My Finance</span>
            <i class="fa-solid fa-circle-user text-2xl opacity-80"></i>
        </div>
        <div class="text-center">
            <p class="text-[10px] font-bold uppercase opacity-70 mb-1">Total Savings</p>
            <h1 id="top-balance" class="text-4xl font-bold tracking-tight">₹0</h1>
        </div>
    </div>

    <div class="content-area" id="content-area">
        <div id="home-view" class="view active">
            <div class="card flex flex-col items-center">
                <div class="relative h-48 w-48 mb-4">
                    <canvas id="expenseChart"></canvas>
                    <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                        <span class="text-[10px] font-bold text-slate-400 uppercase">Spent</span>
                        <span id="ui-expense" class="text-xl font-bold">₹0</span>
                    </div>
                </div>
                <div class="flex justify-around w-full mt-2 border-t pt-4 border-slate-50">
                    <div class="text-center border-r w-1/2">
                        <p class="text-[9px] font-bold text-slate-400 uppercase">Income</p>
                        <p id="ui-income-total" class="text-emerald-500 font-bold">₹0</p>
                    </div>
                    <div class="text-center w-1/2">
                        <p class="text-[9px] font-bold text-slate-400 uppercase">Runway</p>
                        <p id="ui-days" class="text-slate-700 font-bold">--</p>
                    </div>
                </div>
            </div>

            <div class="flex justify-between items-center mb-4 px-1">
                <h3 class="font-bold text-lg">Transactions</h3>
                <span class="text-xs font-bold text-slate-400 uppercase">April 2026</span>
            </div>
            <div id="recent-transactions" class="space-y-4"></div>
        </div>

        <div id="add-view" class="view">
            <div class="card mt-4">
                <h2 class="text-center font-bold text-lg mb-6">New Entry</h2>
                <div class="flex bg-slate-100 p-1.5 rounded-2xl mb-6">
                    <button onclick="setEntryType('Expense')" id="btn-expense" class="flex-1 py-3 rounded-xl bg-white shadow-sm font-bold text-slate-800 transition-all">Expense</button>
                    <button onclick="setEntryType('Income')" id="btn-income" class="flex-1 py-3 rounded-xl text-slate-400 font-bold transition-all">Income</button>
                </div>
                <div class="space-y-5">
                    <input type="date" id="input-date" class="premium-input">
                    <select id="input-category" class="premium-input"></select>
                    <div class="relative">
                        <span class="absolute left-5 top-1/2 -translate-y-1/2 font-bold text-slate-400">₹</span>
                        <input type="number" id="input-amount" placeholder="0.00" class="premium-input pl-10">
                    </div>
                    <input type="text" id="input-note" placeholder="Note (E.g. Dinner, Rent)" class="premium-input">
                    <button onclick="addTransaction()" id="save-btn" class="w-full py-5 bg-[#67a38a] text-white rounded-2xl font-bold shadow-lg shadow-emerald-100">Save Transaction</button>
                </div>
            </div>
        </div>

        <div id="chat-view" class="view">
            <div class="flex items-center gap-4 mb-6 mt-4">
                <div class="w-14 h-14 rounded-full bg-emerald-50 flex items-center justify-center">
                    <i class="fa-solid fa-robot text-2xl text-[#67a38a]"></i>
                </div>
                <div>
                    <h2 class="font-bold text-lg">AI Financial Coach</h2>
                    <p class="text-xs font-bold text-emerald-500 uppercase">Always Active</p>
                </div>
            </div>
            <div id="chat-box" class="h-[45vh] overflow-y-auto space-y-4 mb-6 px-1">
                <div class="flex gap-3">
                    <div class="bg-white border p-4 rounded-2xl rounded-tl-none text-sm leading-relaxed shadow-sm">
                        Hello Sayyed! I understand English & Hindi. Ask me about your expenses or savings.
                    </div>
                </div>
            </div>
            <div class="flex gap-2 bg-white p-2 rounded-full shadow-lg border">
                <input type="text" id="chat-input" placeholder="Mera kharcha kitna hai?" class="flex-1 bg-transparent px-5 py-2 text-sm outline-none font-medium">
                <button onclick="sendChat()" class="w-12 h-12 bg-[#67a38a] text-white rounded-full flex items-center justify-center shadow-md"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>

        <div id="history-view" class="view">
            <div class="flex justify-between items-center mt-6 mb-6">
                <h2 class="text-xl font-bold">Recent History</h2>
                <div class="flex gap-2">
                    <button onclick="viewInvoice()" class="w-10 h-10 bg-white shadow-sm border rounded-xl text-[#67a38a]"><i class="fa-solid fa-file-pdf"></i></button>
                    <button onclick="clearDatabase()" class="w-10 h-10 bg-white shadow-sm border rounded-xl text-red-400"><i class="fa-solid fa-trash-can"></i></button>
                </div>
            </div>
            <div id="all-transactions" class="space-y-4"></div>
        </div>
    </div>

    <button class="fab-button" onclick="switchTab('add')"><i class="fa-solid fa-plus"></i></button>

    <div class="nav-bar">
        <div class="nav-item active" onclick="switchTab('home')"><i class="fa-solid fa-house-chimney"></i><span>Home</span></div>
        <div class="nav-item" onclick="switchTab('history')"><i class="fa-solid fa-clock-rotate-left"></i><span>History</span></div>
        <div class="nav-item opacity-0 pointer-events-none"><span></span></div>
        <div class="nav-item" onclick="switchTab('chat')"><i class="fa-solid fa-robot"></i><span>Coach</span></div>
        <div class="nav-item" onclick="viewInvoice()"><i class="fa-solid fa-chart-line"></i><span>Report</span></div>
    </div>

    <div id="invoice-modal" class="fixed inset-0 bg-black/60 hidden z-[200] items-center justify-center p-4">
        <div class="modal-box shadow-2xl">
            <div class="bg-slate-900 p-6 text-white flex justify-between items-center">
                <span class="font-bold">Monthly Report</span>
                <button onclick="closeInvoice()"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="modal-body" id="invoice-content-print">
                <div id="invoice-content"></div>
            </div>
            <div class="p-6 bg-slate-50 flex gap-3 border-t">
                <button onclick="downloadCSV()" class="flex-1 py-3 bg-emerald-600 text-white rounded-xl font-bold shadow-md">CSV</button>
                <button onclick="downloadPDF()" class="flex-1 py-3 bg-red-600 text-white rounded-xl font-bold shadow-md">PDF</button>
            </div>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://ai-money-coach.onrender.com"; 
    let sessionId = localStorage.getItem('moneycoach_session_id');
    if (!sessionId) {
        sessionId = 'user_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('moneycoach_session_id', sessionId);
    }
    function getHeaders() { return { "Content-Type": "application/json", "X-Session-ID": sessionId }; }

    let currentEntryType = "Expense";
    let expenseChartInstance = null;
    document.getElementById('input-date').valueAsDate = new Date();

    function switchTab(tabName) {
        document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
        document.getElementById(tabName + '-view').classList.add('active');
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        
        const tabs = document.querySelectorAll('.nav-item');
        if(tabName === 'home') tabs[0].classList.add('active');
        if(tabName === 'history') tabs[1].classList.add('active');
        if(tabName === 'chat') tabs[3].classList.add('active');
        if(tabName === 'report') tabs[4].classList.add('active');

        if(tabName === 'home') fetchData();
        if(tabName === 'history') fetchHistory();
    }

    function setEntryType(type) {
        currentEntryType = type;
        const btnExp = document.getElementById('btn-expense');
        const btnInc = document.getElementById('btn-income');
        const catSelect = document.getElementById('input-category');
        btnExp.className = btnInc.className = "flex-1 py-3 rounded-xl font-bold text-slate-400 transition-all";
        if(type === 'Expense') {
            btnExp.className = "flex-1 py-3 rounded-xl bg-white shadow-sm text-slate-800 font-bold";
            catSelect.innerHTML = `<option>Food & Dining</option><option>Groceries</option><option>Transport</option><option>Shopping</option><option>Rent</option><option>Bills</option><option>Health</option><option>SIP/Investments</option><option>Others</option>`;
        } else {
            btnInc.className = "flex-1 py-3 rounded-xl bg-white shadow-sm text-slate-800 font-bold";
            catSelect.innerHTML = `<option>Salary</option><option>Freelance</option><option>Pocket Money</option><option>Investments</option><option>Others</option>`;
        }
    }

    async function fetchData() {
        try {
            const res = await fetch(`${API_URL}/summary`, { headers: getHeaders() });
            const data = await res.json();
            document.getElementById('top-balance').innerText = `₹${data.current_balance.toLocaleString('en-IN')}`;
            document.getElementById('ui-expense').innerText = `₹${data.total_expense.toLocaleString('en-IN')}`;
            document.getElementById('ui-income-total').innerText = `₹${data.monthly_income.toLocaleString('en-IN')}`;
            document.getElementById('ui-days').innerText = (data.avg_daily_expense > 0) ? `${Math.floor(data.current_balance / data.avg_daily_expense)} Days` : "Safe";
            fetchHistory(true);
            renderChart();
        } catch (e) { console.error("Summary load failed."); }
    }

    async function fetchHistory(onlyRecent = false) {
        try {
            const res = await fetch(`${API_URL}/transactions`, { headers: getHeaders() });
            const data = await res.json();
            const container = document.getElementById(onlyRecent ? 'recent-transactions' : 'all-transactions');
            container.innerHTML = '';
            const items = onlyRecent ? data.slice(0, 4) : data;
            
            items.forEach(t => {
                const isExp = t.type === 'Expense';
                container.innerHTML += `
                    <div class="flex items-center justify-between p-4 bg-white rounded-3xl shadow-sm border border-slate-50">
                        <div class="flex items-center gap-4">
                            <div class="w-12 h-12 rounded-2xl flex items-center justify-center ${isExp?'bg-red-50 text-red-400':'bg-emerald-50 text-emerald-400'}">
                                <i class="fa-solid ${isExp?'fa-arrow-up-right':'fa-arrow-down-left'}"></i>
                            </div>
                            <div>
                                <p class="text-sm font-bold">${t.category}</p>
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">${t.date}</p>
                            </div>
                        </div>
                        <p class="font-bold ${isExp?'text-slate-700':'text-emerald-500'}">${isExp?'-':'+'}₹${t.amount.toLocaleString('en-IN')}</p>
                    </div>`;
            });
        } catch (e) {}
    }

    async function addTransaction() {
        const payload = { 
            type: currentEntryType, 
            category: document.getElementById('input-category').value, 
            amount: parseFloat(document.getElementById('input-amount').value), 
            note: document.getElementById('input-note').value, 
            date: document.getElementById('input-date').value 
        };
        if(!payload.amount) return alert("Enter amount!");
        const btn = document.getElementById('save-btn');
        btn.innerHTML = '<div class="loader mx-auto"></div>';
        try {
            await fetch(`${API_URL}/transactions`, { method: "POST", headers: getHeaders(), body: JSON.stringify(payload) });
            await fetchData();
            switchTab('home');
        } catch (e) { alert("Backend Error"); }
        btn.innerHTML = 'Save Transaction';
    }

    async function renderChart() {
        const month = new Date().toISOString().slice(0, 7);
        try {
            const res = await fetch(`${API_URL}/monthly-report/${month}`, { headers: getHeaders() });
            const data = await res.json();
            const ctx = document.getElementById('expenseChart').getContext('2d');
            if (expenseChartInstance) expenseChartInstance.destroy();
            
            expenseChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    datasets: [{ 
                        data: data.category_breakdown.length ? data.category_breakdown.map(i => i.total) : [1], 
                        backgroundColor: ['#fd5c63', '#febd41', '#3498db', '#2ecc71', '#9b59b6'],
                        borderWidth: 8, borderColor: '#ffffff'
                    }]
                },
                options: { cutout: '85%', plugins: { legend: { display: false } } }
            });
        } catch (e) {}
    }

    async function sendChat() {
        const input = document.getElementById('chat-input');
        const question = input.value.trim();
        if(!question) return;
        const chatBox = document.getElementById('chat-box');
        chatBox.innerHTML += `<div class="flex justify-end"><div class="bg-slate-700 text-white p-4 rounded-2xl rounded-tr-none text-sm shadow-md">${question}</div></div>`;
        input.value = '';
        try {
            const res = await fetch(`${API_URL}/chat`, { method: "POST", headers: getHeaders(), body: JSON.stringify({ question }) });
            const data = await res.json();
            chatBox.innerHTML += `<div class="flex justify-start"><div class="bg-white border p-4 rounded-2xl rounded-tl-none text-sm shadow-sm leading-relaxed">${data.reply}</div></div>`;
        } catch (e) {}
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function viewInvoice() {
        const modal = document.getElementById('invoice-modal');
        modal.classList.remove('hidden');
        modal.classList.add('flex');
        const month = new Date().toISOString().slice(0, 7);
        const res = await fetch(`${API_URL}/monthly-report/${month}`, { headers: getHeaders() });
        const data = await res.json();
        let html = `<div class="text-center mb-6"><h3 class="text-xl font-bold">Summary</h3><p class="text-[10px] font-bold text-slate-400 uppercase">${month}</p></div>`;
        html += `<div class="bg-slate-900 text-white p-5 rounded-3xl flex justify-between mb-8 shadow-xl"><div><p class="text-[9px] uppercase font-bold text-slate-400">Income</p><p class="text-emerald-400 font-bold">₹${data.total_income}</p></div><div><p class="text-[9px] uppercase font-bold text-slate-400">Spent</p><p class="text-orange-400 font-bold">₹${data.total_expense}</p></div></div>`;
        html += `<table class="w-full text-sm"><tbody>`;
        data.transactions.forEach(t => {
            html += `<tr class="border-b border-slate-50"><td class="py-3 text-xs text-slate-400 font-bold">${t.date}</td><td class="py-3 font-bold">${t.category}</td><td class="py-3 text-right font-bold">₹${t.amount}</td></tr>`;
        });
        html += `</tbody></table><p class="text-center text-[10px] font-bold text-slate-300 mt-10">Developed by Sayyed Mohsin Ali</p>`;
        document.getElementById('invoice-content').innerHTML = html;
    }

    function closeInvoice() { document.getElementById('invoice-modal').classList.add('hidden'); }
    function downloadCSV() { window.location.href = `${API_URL}/download-csv/${new Date().toISOString().slice(0, 7)}?x_session_id=${sessionId}`; }
    function downloadPDF() { html2pdf().from(document.getElementById('invoice-content')).save(); }

    window.onload = () => { setEntryType('Expense'); fetchData(); };
</script>
</body>
</html>

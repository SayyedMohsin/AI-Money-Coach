<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Money Coach App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body { background-color: #e2e8f0; display: flex; justify-content: center; font-family: 'Inter', sans-serif; margin: 0; }
        .app-container { width: 100%; max-width: 414px; height: 100vh; background-color: #f8fafc; position: relative; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25); display: flex; flex-direction: column; overflow: hidden; }
        .content-area { flex: 1; overflow-y: auto; padding-bottom: 120px; scroll-behavior: smooth; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        .nav-bar { position: absolute; bottom: 0; width: 100%; height: 70px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-top: 1px solid #e2e8f0; display: flex; justify-content: space-around; align-items: center; z-index: 50; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #94a3b8; cursor: pointer; font-size: 0.7rem; width: 25%; }
        .nav-item.active { color: #4f46e5; }
        .view { display: none; padding: 24px; }
        .view.active { display: block; animation: fadeUp 0.4s ease; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .loader { border: 2px solid #e2e8f0; border-top: 2px solid #4f46e5; border-radius: 50%; width: 18px; height: 18px; animation: spin 0.8s linear infinite; display: inline-block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .premium-input { background-color: #ffffff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 14px 16px; width: 100%; outline: none; }
        .modal { display: none; position: absolute; inset: 0; background: rgba(0,0,0,0.5); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="bg-white px-6 py-5 sticky top-0 z-10 flex justify-between items-center border-b border-gray-100">
        <div class="flex items-center gap-2">
            <div class="bg-indigo-600 text-white w-8 h-8 rounded-lg flex items-center justify-center shadow-md"><i class="fa-solid fa-wallet text-sm"></i></div>
            <h1 class="text-xl font-bold text-slate-800 tracking-tight">Money Coach</h1>
        </div>
    </div>

    <div class="content-area" id="content-area">
        <div id="home-view" class="view active">
            <div class="bg-slate-900 rounded-3xl p-6 text-white shadow-xl mb-8 relative overflow-hidden">
                <p class="text-slate-400 text-sm mb-1">Total Available Balance</p>
                <h2 class="text-4xl font-bold mb-6" id="ui-balance">₹0</h2>
                <div class="flex justify-between items-end">
                    <div><p class="text-slate-400 text-xs mb-1">This Month's Expense</p><p class="font-semibold text-lg" id="ui-expense">₹0</p></div>
                    <div class="text-right"><p class="text-slate-400 text-xs mb-1">Runway</p><p class="font-semibold text-lg text-emerald-400" id="ui-days">0 Days</p></div>
                </div>
            </div>
            <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 mb-6">
                <h3 class="font-bold text-slate-800 text-sm mb-4">Spending Analysis</h3>
                <div class="relative h-48 w-full flex justify-center items-center">
                    <canvas id="expenseChart"></canvas>
                    <div id="no-chart-data" class="absolute hidden flex-col items-center justify-center text-slate-400 text-xs">
                        <i class="fa-solid fa-chart-pie text-3xl mb-2 opacity-30"></i><p>No data</p>
                    </div>
                </div>
            </div>
            <div class="flex justify-between items-center mb-4"><h3 class="font-bold text-slate-800 text-lg">Recent Transactions</h3></div>
            <div id="recent-transactions" class="space-y-3"><div class="flex justify-center py-6"><div class="loader"></div></div></div>
        </div>

        <div id="add-view" class="view">
            <h2 class="text-2xl font-bold text-slate-800 mb-6">Add Transaction</h2>
            <div class="flex bg-slate-100 p-1.5 rounded-xl mb-6">
                <button onclick="setEntryType('Expense')" id="btn-expense" class="flex-1 py-2.5 rounded-lg bg-white shadow-sm text-slate-800 font-semibold text-sm">Expense</button>
                <button onclick="setEntryType('Income')" id="btn-income" class="flex-1 py-2.5 rounded-lg text-slate-500 font-medium text-sm">Income</button>
            </div>
            <div class="space-y-5">
                <input type="date" id="input-date" class="premium-input text-slate-800">
                <select id="input-category" class="premium-input text-slate-800"><option>Food & Dining</option><option>Transport</option></select>
                <input type="number" id="input-amount" placeholder="Amount ₹" class="premium-input font-semibold text-slate-800">
                <input type="text" id="input-note" placeholder="Note (Optional)" class="premium-input text-slate-800">
                <button onclick="addTransaction()" id="save-btn" class="w-full bg-indigo-600 text-white font-semibold py-4 rounded-xl shadow-lg mt-6">Save Transaction</button>
            </div>
        </div>

        <div id="chat-view" class="view flex-col h-full">
            <div id="chat-box" class="bg-white border rounded-2xl p-4 h-[55vh] overflow-y-auto mb-4 space-y-4 shadow-sm"></div>
            <div class="flex gap-2"><input type="text" id="chat-input" placeholder="Ask AI..." class="flex-1 border rounded-full px-5 py-3 text-sm outline-none"><button onclick="sendChat()" class="bg-indigo-600 text-white w-12 h-12 rounded-full flex justify-center items-center"><i class="fa-solid fa-paper-plane"></i></button></div>
        </div>

        <div id="history-view" class="view">
            <h2 class="text-2xl font-bold text-slate-800 mb-6">History</h2>
            <div class="flex gap-3 mb-6">
                <button onclick="viewInvoice()" class="flex-1 bg-indigo-50 text-indigo-600 py-2.5 rounded-xl font-semibold text-sm">Invoice</button>
                <button onclick="clearDatabase()" class="flex-1 bg-red-50 text-red-600 py-2.5 rounded-xl font-semibold text-sm">Clear</button>
            </div>
            <div id="all-transactions" class="space-y-3"></div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="switchTab('home')"><i class="fa-solid fa-house"></i><span>Home</span></div>
        <div class="nav-item" onclick="switchTab('add')"><i class="fa-solid fa-circle-plus"></i><span>Add</span></div>
        <div class="nav-item" onclick="switchTab('history')"><i class="fa-solid fa-list"></i><span>History</span></div>
        <div class="nav-item" onclick="switchTab('chat')"><i class="fa-solid fa-sparkles"></i><span>AI Coach</span></div>
    </div>
</div>

<script>
    // 1. AAPKA RENDER URL (Check karke sahi dalein)
    const API_URL = "https://ai-money-coach.onrender.com"; 
    
    // 2. SESSION LOGIC (Iske bina Backend connect nahi hoga)
    let sessionId = localStorage.getItem('moneycoach_session_id');
    if (!sessionId) {
        sessionId = 'user_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('moneycoach_session_id', sessionId);
    }

    function getHeaders() {
        return { 
            "Content-Type": "application/json",
            "X-Session-ID": sessionId 
        };
    }

    let currentEntryType = "Expense";
    let expenseChartInstance = null;
    document.getElementById('input-date').valueAsDate = new Date();

    function switchTab(tabName) {
        document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
        document.getElementById(tabName + '-view').classList.add('active');
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        event.currentTarget.classList.add('active');
        if(tabName === 'home') fetchData();
        if(tabName === 'history') fetchHistory();
    }

    function setEntryType(type) {
        currentEntryType = type;
        const btnExp = document.getElementById('btn-expense');
        const btnInc = document.getElementById('btn-income');
        const catSelect = document.getElementById('input-category');
        btnExp.className = "flex-1 py-2.5 rounded-lg font-medium text-sm text-slate-500";
        btnInc.className = "flex-1 py-2.5 rounded-lg font-medium text-sm text-slate-500";
        if(type === 'Expense') {
            btnExp.className = "flex-1 py-2.5 rounded-lg bg-white shadow-sm text-slate-800 font-semibold text-sm";
            catSelect.innerHTML = `<option>Food & Dining</option><option>Transport</option><option>Rent</option><option>Others</option>`;
        } else {
            btnInc.className = "flex-1 py-2.5 rounded-lg bg-white shadow-sm text-slate-800 font-semibold text-sm";
            catSelect.innerHTML = `<option>Salary</option><option>Freelance</option><option>Pocket Money</option>`;
        }
    }

    async function fetchData() {
        try {
            const res = await fetch(`${API_URL}/summary`, { headers: getHeaders() });
            const data = await res.json();
            document.getElementById('ui-balance').innerText = `₹${data.current_balance.toLocaleString('en-IN')}`;
            document.getElementById('ui-expense').innerText = `₹${data.total_expense.toLocaleString('en-IN')}`;
            document.getElementById('ui-days').innerText = data.days_left === 999 ? "Safe" : `${data.days_left} Days`;
            fetchHistory(true);
            renderChart();
        } catch (e) { console.error("Summary error", e); }
    }

    async function fetchHistory(onlyRecent = false) {
        try {
            const res = await fetch(`${API_URL}/transactions`, { headers: getHeaders() });
            const data = await res.json();
            const container = document.getElementById(onlyRecent ? 'recent-transactions' : 'all-transactions');
            container.innerHTML = '';
            const items = onlyRecent ? data.slice(0, 4) : data;
            items.forEach(t => {
                const isExp = t.type === 'Expense';
                container.innerHTML += `<div class="bg-white p-4 rounded-2xl flex justify-between shadow-sm"><div><p class="font-bold text-sm">${t.category}</p><p class="text-xs text-slate-400">${t.date}</p></div><p class="font-bold ${isExp ? 'text-slate-800' : 'text-emerald-600'}">${isExp?'-':'+'}₹${t.amount}</p></div>`;
            });
        } catch (e) {}
    }

    async function addTransaction() {
        const date = document.getElementById('input-date').value;
        const category = document.getElementById('input-category').value;
        const amount = document.getElementById('input-amount').value;
        const note = document.getElementById('input-note').value;

        if(!amount || amount <= 0) return alert("Sahi amount dalein!");

        const payload = { type: currentEntryType, category, amount: parseFloat(amount), note, date };
        const btn = document.getElementById('save-btn');
        btn.innerHTML = 'Saving...';

        try {
            const res = await fetch(`${API_URL}/transactions`, { 
                method: "POST", 
                headers: getHeaders(), // <--- Headers fixed
                body: JSON.stringify(payload) 
            });
            if(res.ok) {
                document.getElementById('input-amount').value = '';
                document.getElementById('input-note').value = '';
                switchTab('home');
            } else { alert("Error adding transaction"); }
        } catch (e) { alert("Backend connect nahi ho raha."); }
        btn.innerHTML = 'Save Transaction';
    }

    async function sendChat() {
        const input = document.getElementById('chat-input');
        const question = input.value.trim();
        if(!question) return;
        const chatBox = document.getElementById('chat-box');
        chatBox.innerHTML += `<div class="text-right"><span class="bg-indigo-600 text-white p-3 rounded-xl inline-block text-sm">${question}</span></div>`;
        input.value = '';
        try {
            const res = await fetch(`${API_URL}/chat`, { method: "POST", headers: getHeaders(), body: JSON.stringify({ question }) });
            const data = await res.json();
            chatBox.innerHTML += `<div class="text-left"><span class="bg-slate-100 p-3 rounded-xl inline-block text-sm text-slate-700">${data.reply}</span></div>`;
        } catch (e) { chatBox.innerHTML += `<div class="text-red-500 text-xs">Error connecting to AI</div>`; }
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function renderChart() {
        const today = new Date();
        const month = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0');
        try {
            const res = await fetch(`${API_URL}/monthly-report/${month}`, { headers: getHeaders() });
            const data = await res.json();
            const ctx = document.getElementById('expenseChart').getContext('2d');
            if (expenseChartInstance) expenseChartInstance.destroy();
            if (!data.category_breakdown.length) { document.getElementById('no-chart-data').classList.remove('hidden'); return; }
            document.getElementById('no-chart-data').classList.add('hidden');
            expenseChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: data.category_breakdown.map(i => i.category),
                    datasets: [{ data: data.category_breakdown.map(i => i.total), backgroundColor: ['#4f46e5', '#0ea5e9', '#10b981', '#f59e0b'] }]
                },
                options: { cutout: '75%', plugins: { legend: { position: 'right' } } }
            });
        } catch (e) {}
    }

    async function clearDatabase() {
        if(confirm("Delete all data?")) {
            await fetch(`${API_URL}/clear-db`, { method: 'DELETE', headers: getHeaders() });
            fetchData();
        }
    }

    window.onload = fetchData;
</script>
</body>
</html>

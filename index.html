<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Money Coach - Simple & Perfect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        /* ARIAL FONT AS REQUESTED */
        body { 
            font-family: Arial, sans-serif; 
            background-color: #f1f3f4; 
            margin: 0; 
            display: flex; 
            justify-content: center;
        }
        
        .app-container { 
            width: 100%; 
            max-width: 414px; 
            height: 100vh; 
            background-color: #ffffff; 
            position: relative; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        .content-area { 
            flex: 1; 
            overflow-y: auto; 
            padding-bottom: 90px;
        }

        /* GPAY STYLE TABS */
        .view { display: none; padding: 20px; }
        .view.active { display: block; }

        /* GPAY STYLE BUTTONS */
        .gpay-btn {
            background-color: #1a73e8;
            color: white;
            padding: 16px;
            border-radius: 24px;
            font-weight: bold;
            width: 100%;
            text-align: center;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }

        /* NAVIGATION BAR */
        .nav-bar {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 70px;
            background: #ffffff;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border-top: 1px solid #dadce0;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #5f6368;
            font-size: 12px;
            cursor: pointer;
            width: 25%;
        }

        .nav-item.active { color: #1a73e8; font-weight: bold; }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }

        /* INPUTS */
        .g-input {
            width: 100%;
            padding: 14px;
            border: 1px solid #dadce0;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 16px;
            outline: none;
        }
        .g-input:focus { border: 2px solid #1a73e8; }

        /* CHAT BUBBLES */
        .chat-user { background-color: #e8f0fe; color: #1967d2; align-self: flex-end; border-radius: 16px 16px 0 16px; }
        .chat-ai { background-color: #f1f3f4; color: #3c4043; align-self: flex-start; border-radius: 16px 16px 16px 0; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="px-6 py-4 flex justify-between items-center border-b">
        <span class="text-xl font-bold text-gray-800">Money Coach</span>
        <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-bold">M</div>
    </div>

    <div class="content-area" id="content-area">
        
        <div id="home-view" class="view active">
            <div class="bg-blue-600 rounded-3xl p-6 text-white mb-6 shadow-md">
                <p class="text-xs opacity-80 uppercase tracking-wider mb-1">Current Balance</p>
                <h2 class="text-3xl font-bold mb-4" id="ui-balance">₹0</h2>
                <div class="flex justify-between text-sm">
                    <span>Expenses: <b id="ui-expense">₹0</b></span>
                    <span>Runway: <b id="ui-days">SAFE</b></span>
                </div>
            </div>

            <div class="bg-white p-4 rounded-xl border mb-6 shadow-sm">
                <p class="text-xs font-bold text-gray-500 mb-4 uppercase">Analytics</p>
                <div class="h-40 w-full">
                    <canvas id="expenseChart"></canvas>
                </div>
            </div>

            <p class="text-xs font-bold text-gray-500 mb-3 uppercase">Recent Activity</p>
            <div id="recent-transactions" class="space-y-3"></div>
        </div>

        <div id="add-view" class="view">
            <h2 class="text-xl font-bold mb-6">Add Transaction</h2>
            <div class="flex border rounded-xl overflow-hidden mb-6">
                <button onclick="setEntryType('Expense')" id="btn-expense" class="flex-1 py-3 bg-blue-600 text-white font-bold">Expense</button>
                <button onclick="setEntryType('Income')" id="btn-income" class="flex-1 py-3 text-gray-600 font-bold bg-gray-50">Income</button>
            </div>

            <label class="text-xs font-bold text-gray-500 uppercase ml-1">Date</label>
            <input type="date" id="input-date" class="g-input">
            
            <label class="text-xs font-bold text-gray-500 uppercase ml-1">Category</label>
            <select id="input-category" class="g-input"></select>
            
            <label class="text-xs font-bold text-gray-500 uppercase ml-1">Amount (₹)</label>
            <input type="number" id="input-amount" placeholder="0.00" class="g-input font-bold text-lg">
            
            <label class="text-xs font-bold text-gray-500 uppercase ml-1">Note</label>
            <input type="text" id="input-note" placeholder="E.g. Lunch with friends" class="g-input">
            
            <button onclick="addTransaction()" id="save-btn" class="gpay-btn mt-4">Save to History</button>
        </div>

        <div id="history-view" class="view">
            <h2 class="text-xl font-bold mb-6">Transaction History</h2>
            <div class="flex gap-3 mb-6">
                <button onclick="viewInvoice()" class="flex-1 py-3 border border-blue-600 text-blue-600 rounded-xl font-bold text-sm">Invoice</button>
                <button onclick="clearDatabase()" class="flex-1 py-3 border border-red-300 text-red-500 rounded-xl font-bold text-sm">Clear All</button>
            </div>
            <div id="all-transactions" class="space-y-3"></div>
        </div>

        <div id="chat-view" class="view flex-col h-full">
            <h2 class="text-xl font-bold mb-1">AI Coach</h2>
            <p class="text-xs text-gray-400 mb-4">English & Hindi Support</p>
            
            <div id="chat-box" class="flex-1 border-t py-4 overflow-y-auto space-y-4 flex flex-col mb-4" style="height: 50vh;">
                <div class="chat-ai p-3 max-w-[80%] text-sm leading-relaxed">
                    Hello! Ask me "Mera kharcha kitna hai?" or anything about your money.
                </div>
            </div>

            <div class="flex gap-2 items-center border-t pt-4">
                <input type="text" id="chat-input" placeholder="Ask something..." class="flex-1 p-3 outline-none text-sm bg-gray-50 rounded-full">
                <button onclick="sendChat()" class="text-blue-600 w-10 h-10 flex items-center justify-center"><i class="fa-solid fa-paper-plane text-xl"></i></button>
            </div>
        </div>

    </div>

    <div class="nav-bar">
        <div class="nav-item active" onclick="switchTab('home')"><i class="fa-solid fa-house"></i><span>Home</span></div>
        <div class="nav-item" onclick="switchTab('add')"><i class="fa-solid fa-plus"></i><span>Add</span></div>
        <div class="nav-item" onclick="switchTab('history')"><i class="fa-solid fa-receipt"></i><span>History</span></div>
        <div class="nav-item" onclick="switchTab('chat')"><i class="fa-solid fa-comment-dots"></i><span>Coach</span></div>
    </div>

    <div id="invoice-modal" class="fixed inset-0 bg-black/50 z-[200] hidden items-center justify-center p-4">
        <div class="bg-white w-full rounded-2xl overflow-hidden flex flex-col max-h-[85vh]">
            <div class="p-4 border-b flex justify-between items-center">
                <span class="font-bold">Monthly Invoice</span>
                <button onclick="closeInvoice()"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <div class="p-6 overflow-y-auto flex-1 bg-white" id="invoice-print-area">
                <div id="invoice-content"></div>
            </div>
            <div class="p-4 bg-gray-50 flex gap-2">
                <button onclick="downloadCSV()" class="flex-1 py-3 bg-green-600 text-white rounded-xl font-bold text-xs uppercase">Excel</button>
                <button onclick="downloadPDF()" class="flex-1 py-3 bg-red-600 text-white rounded-xl font-bold text-xs uppercase">PDF</button>
            </div>
        </div>
    </div>
</div>

<script>
    // URL AUR SESSION
    const API_URL = "https://ai-money-coach.onrender.com"; 
    let sessionId = localStorage.getItem('moneycoach_session_id');
    if (!sessionId) {
        sessionId = 'user_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('moneycoach_session_id', sessionId);
    }
    const getHeaders = () => ({ "Content-Type": "application/json", "X-Session-ID": sessionId });

    let currentEntryType = "Expense";
    let expenseChartInstance = null;
    let currentReportMonth = new Date().toISOString().slice(0, 7);

    document.getElementById('input-date').valueAsDate = new Date();

    function switchTab(tabName) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(tabName + '-view').classList.add('active');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        event.currentTarget.classList.add('active');
        if(tabName === 'home') fetchData();
        if(tabName === 'history') fetchHistory();
    }

    function setEntryType(type) {
        currentEntryType = type;
        const btnExp = document.getElementById('btn-expense');
        const btnInc = document.getElementById('btn-income');
        const catSelect = document.getElementById('input-category');
        if(type === 'Expense') {
            btnExp.className = "flex-1 py-3 bg-blue-600 text-white font-bold";
            btnInc.className = "flex-1 py-3 text-gray-600 bg-gray-50 font-bold";
            catSelect.innerHTML = `<option>Food & Dining</option><option>Transport</option><option>Shopping</option><option>Bills</option><option>Medical</option><option>Rent</option><option>Others</option>`;
        } else {
            btnInc.className = "flex-1 py-3 bg-blue-600 text-white font-bold";
            btnExp.className = "flex-1 py-3 text-gray-600 bg-gray-50 font-bold";
            catSelect.innerHTML = `<option>Salary</option><option>Freelance</option><option>Interest</option><option>Gifts</option><option>Others</option>`;
        }
    }

    async function fetchData() {
        try {
            const res = await fetch(`${API_URL}/summary`, { headers: getHeaders() });
            const data = await res.json();
            document.getElementById('ui-balance').innerText = `₹${data.current_balance.toLocaleString('en-IN')}`;
            document.getElementById('ui-expense').innerText = `₹${data.total_expense}`;
            document.getElementById('ui-days').innerText = data.avg_daily_expense > 0 ? Math.floor(data.current_balance/data.avg_daily_expense) + " DAYS" : "SAFE";
            fetchHistory(true);
            renderChart();
        } catch (e) { console.error(e); }
    }

    async function fetchHistory(onlyRecent = false) {
        try {
            const res = await fetch(`${API_URL}/transactions`, { headers: getHeaders() });
            const data = await res.json();
            const container = document.getElementById(onlyRecent ? 'recent-transactions' : 'all-transactions');
            container.innerHTML = '';
            const items = onlyRecent ? data.slice(0, 5) : data;
            items.forEach(t => {
                const isExp = t.type === 'Expense';
                container.innerHTML += `
                    <div class="flex justify-between items-center py-3 border-b border-gray-50">
                        <div>
                            <p class="font-bold text-gray-800 text-sm">${t.category}</p>
                            <p class="text-[10px] text-gray-400 uppercase">${t.date}</p>
                        </div>
                        <p class="font-bold text-sm ${isExp?'text-gray-800':'text-green-600'}">${isExp?'-':'+'}₹${t.amount}</p>
                    </div>`;
            });
        } catch (e) {}
    }

    async function addTransaction() {
        const payload = { 
            type: currentEntryType, 
            category: document.getElementById('input-category').value, 
            amount: parseFloat(document.getElementById('input-amount').value), 
            note: document.getElementById('input-note').value, 
            date: document.getElementById('input-date').value 
        };
        if(!payload.amount) return alert("Enter amount");
        const btn = document.getElementById('save-btn');
        btn.innerText = "Saving...";
        try {
            const res = await fetch(`${API_URL}/transactions`, { method: "POST", headers: getHeaders(), body: JSON.stringify(payload) });
            if(res.ok) {
                document.getElementById('input-amount').value = '';
                await fetchData();
                switchTab('home');
            }
        } catch (e) { alert("Network Error"); }
        btn.innerText = "Save to History";
    }

    async function renderChart() {
        const month = new Date().toISOString().slice(0, 7);
        try {
            const res = await fetch(`${API_URL}/monthly-report/${month}`, { headers: getHeaders() });
            const data = await res.json();
            const ctx = document.getElementById('expenseChart').getContext('2d');
            if (expenseChartInstance) expenseChartInstance.destroy();
            expenseChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: data.category_breakdown.map(i => i.category),
                    datasets: [{ 
                        data: data.category_breakdown.map(i => i.total), 
                        backgroundColor: ['#1a73e8', '#34a853', '#fabb05', '#ea4335', '#a142f4'],
                        borderWidth: 2
                    }]
                },
                options: { cutout: '70%', plugins: { legend: { display: false } } }
            });
        } catch (e) {}
    }

    async function sendChat() {
        const input = document.getElementById('chat-input');
        const question = input.value.trim();
        if(!question) return;
        const chatBox = document.getElementById('chat-box');
        chatBox.innerHTML += `<div class="chat-user p-3 max-w-[80%] text-sm self-end">${question}</div>`;
        input.value = '';
        try {
            const res = await fetch(`${API_URL}/chat`, { method: "POST", headers: getHeaders(), body: JSON.stringify({ question }) });
            const data = await res.json();
            chatBox.innerHTML += `<div class="chat-ai p-3 max-w-[80%] text-sm self-start">${data.reply}</div>`;
        } catch (e) {}
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function viewInvoice() {
        const modal = document.getElementById('invoice-modal');
        modal.classList.remove('hidden');
        modal.classList.add('flex');
        const res = await fetch(`${API_URL}/monthly-report/${currentReportMonth}`, { headers: getHeaders() });
        const data = await res.json();
        let html = `
            <div class="text-center mb-6"><h2 class="text-xl font-bold">Money Coach Statement</h2><p class="text-xs text-gray-400">${data.month}</p></div>
            <div class="grid grid-cols-2 gap-4 mb-6 text-center">
                <div class="p-3 bg-green-50 rounded-lg"><p class="text-[9px] uppercase font-bold text-green-600">Income</p><p class="font-bold">₹${data.total_income}</p></div>
                <div class="p-3 bg-red-50 rounded-lg"><p class="text-[9px] uppercase font-bold text-red-600">Expense</p><p class="font-bold">₹${data.total_expense}</p></div>
            </div>
            <table class="w-full text-[10px] text-left">
                <thead class="border-b uppercase"><tr><th class="py-2">Date</th><th>Category</th><th class="text-right">Amount</th></tr></thead>
                <tbody>`;
        data.transactions.forEach(t => {
            html += `<tr class="border-b"><td class="py-2 text-gray-400">${t.date}</td><td>${t.category}</td><td class="text-right font-bold">₹${t.amount}</td></tr>`;
        });
        html += `</tbody></table><div class="mt-6 text-center text-[9px] text-gray-400">Total Savings: ₹${data.total_income-data.total_expense}<br>Developed by Sayyed Mohsin Ali</div>`;
        document.getElementById('invoice-content').innerHTML = html;
    }

    function closeInvoice() { document.getElementById('invoice-modal').classList.add('hidden'); }
    function downloadCSV() { window.location.href = `${API_URL}/download-csv/${currentReportMonth}?x_session_id=${sessionId}`; }
    function downloadPDF() { html2pdf().from(document.getElementById('invoice-print-area')).save(); }
    async function clearDatabase() { if(confirm("Clear all data?")) { await fetch(`${API_URL}/clear-db`, { method: 'DELETE', headers: getHeaders() }); fetchData(); } }

    window.onload = () => { setEntryType('Expense'); fetchData(); };
</script>
</body>
</html>
